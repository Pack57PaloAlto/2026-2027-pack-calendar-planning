# ============================================================================
# Pack 57 Palo Alto — 2026-2027 Calendar Proposal (DRAFT)
# ============================================================================
# For committee review before distribution to parents
#
# Planning principles:
#   1. Pack meetings on 2nd Thursday of the month
#   2. Pack committee meetings 1st Thursday of the month (virtual)
#      (Stanford District Roundtable is the same evening)
#   3. Avoid all PAUSD no-school days, major religious holidays, and
#      known private school breaks
#   4. Den meetings weekly or biweekly per den leader preference
#   5. Align with Pacific Skyline Council / Stanford District events
#   6. Season: September 2026 through May 2027
#
# Conflict calendars consulted (15 sources):
#   Schools:
#     - PAUSD 2026-27 (Addison, Hoover, Palo Verde, Duveneck, Walter Hays,
#       Escondido, Oak Knoll, Ohlone — all follow same district calendar)
#     - Gideon Hausner Jewish Day School 2026-27
#     - Oshman Family JCC closures
#     - Nueva School (estimated)
#     - Bowman School (year-round, flexible)
#     - Keys School (estimated)
#     - St. Raymond School (estimated)
#   Religious / cultural:
#     - Jewish holidays 2026-27 (hebcal.com)
#     - Islamic holidays 2026-27 (fiqhcouncil.org)
#     - Christian holidays 2026-27
#     - Hindu / Indian holidays 2026-27
#   Other:
#     - US federal holidays 2026-27
#     - Pacific Skyline Council / Stanford District events
#
# See also: do-not-book-dates.yaml for the unified conflict calendar
#
# PAUSD Back to School Night: typically late August (~Aug 25-27),
#   well before our September start. No conflict expected.
# ============================================================================

pack: Pack 57 Palo Alto
charter_org: TBD
meeting_location: Addison Elementary School (default)
year: 2026-2027

# ============================================================================
# SEPTEMBER 2026
# ============================================================================
# School conflicts: Labor Day 9/7 Mon
# Jewish: Rosh Hashanah 9/11-13, Yom Kippur 9/20-21, Sukkot 9/25-10/2
# Hindu: Ganesh Chaturthi 9/7 Mon (before pack season)
september:
  - date: 2026-09-03  # Thu
    day: Thursday
    event: Pack Committee Meeting (Virtual)
    type: pack_committee
    time: "7:30 PM"
    notes: "Plan the year; finalize calendar with committee. Also Stanford District Roundtable same evening."

  - date: 2026-09-10  # Thu
    day: Thursday
    event: Pack Kickoff / Registration Night
    type: pack_meeting
    time: "6:30 PM"
    location: Addison Elementary School
    notes: >
      Welcome new and returning families. Distribute year calendar.
      Moved from 3rd Thu (9/17) to 2nd Thursday to avoid proximity
      to Rosh Hashanah (9/11-13). Yom Kippur is 9/20-21.

  - date: 2026-09-12  # Sat
    day: Saturday
    event: "[NO MEETINGS] Rosh Hashanah"
    type: conflict
    notes: "Jewish New Year (Sep 11 sunset – Sep 13 nightfall). JCC closed 9/12; Hausner closed."

  - date: 2026-09-20  # Sun
    day: Sunday
    event: "COUNCIL: Arrowpalooza"
    type: council_event
    location: Coyote Point Recreation Area, San Mateo
    notes: >
      Major Cub Scout council event! Encourage families to attend.
      NOTE: Yom Kippur begins at sunset Sun 9/20 — Jewish families
      will not be available.

  - date: 2026-09-21  # Mon
    day: Monday
    event: "[NO MEETINGS] Yom Kippur"
    type: conflict
    notes: "Day of Atonement — holiest day in Judaism. Hausner & JCC closed."

  - date: 2026-09-26  # Sat
    day: Saturday
    event: "Pack 57 Stanford Football Day"
    type: special_event
    location: Stanford Stadium
    time: "TBD (game time)"
    notes: >
      Stanford vs. Georgia Tech (home game). Family-friendly pack outing.
      Group tickets, tailgate, wear Pack 57 colors. Great way to welcome
      new families and showcase pack spirit!

  - date: 2026-09-28  # Mon
    day: Monday
    event: Den Meetings Begin (week of)
    type: den_meeting
    notes: >
      Den leaders set their own recurring day/time.
      Note: This week falls during Sukkot (Chol HaMoed / intermediate days).
      Some Jewish families may be less available.

