# ============================================================================
# Jewish Holidays — 2026-2027
# ============================================================================
# Complete Jewish holiday calendar for Pack 57 scheduling.
# Jewish holidays begin at sunset the evening before the listed date
# and end at nightfall on the last date shown.
#
# Sources: hebcal.com, chabad.org
# ============================================================================

calendar: Jewish Holidays
coverage: September 2026 – May 2027 (pack season), plus full year context
note: >
  All Jewish holidays begin at sunset the evening before and end at
  nightfall. Dates shown are the primary day(s). Hausner Jewish Day
  School and JCC closures are tracked separately in their own files
  but align with these dates.

# --- Full Year 2026 ---
year_2026:
  - date: 2026-02-01
    holiday: Tu BiShvat
    significance: "New Year for Trees"
    hebrew_date: 15 Sh'vat 5786
    work_restriction: none

  - date: 2026-03-02
    holiday: Purim
    significance: Celebration of Jewish deliverance (Book of Esther)
    hebrew_date: 14 Adar 5786
    duration: "Evening of Mar 2 – nightfall Mar 3"
    work_restriction: none (festive, not a full yom tov)

  - date: 2026-04-01
    holiday: Passover (Pesach) — First Seder
    significance: Commemorates the Exodus from Egypt
    hebrew_date: 15-22 Nisan 5786
    duration: "Apr 1-9 (8 days in diaspora)"
    work_restriction: "No work first 2 days (Apr 1-2) and last 2 days (Apr 8-9); intermediate days (Chol HaMoed) are semi-holiday"

  - date: 2026-05-04
    holiday: Lag BaOmer
    significance: 33rd day of the Omer
    hebrew_date: 18 Iyyar 5786
    work_restriction: none

  - date: 2026-05-21
    holiday: Shavuot
    significance: Festival of Weeks; giving of the Torah at Sinai
    hebrew_date: 6-7 Sivan 5786
    duration: "May 21-23 (2 days in diaspora)"
    work_restriction: full

  - date: 2026-07-23
    holiday: Tisha B'Av
    significance: Fast day; destruction of the Temples
    hebrew_date: 9 Av 5786
    work_restriction: fast day (not a full work restriction)

# --- Pack Season: Sep 2026 – May 2027 ---
pack_season:
  - date: 2026-09-12
    day: Saturday
    holiday: Rosh Hashanah (Day 1)
    significance: Jewish New Year
    hebrew_date: 1-2 Tishrei 5787
    duration: "Sep 11 sunset – Sep 13 nightfall (2 days)"
    work_restriction: full (no work both days)
    pack_note: "Pack kickoff moved to Sep 10 (2nd Thu) to avoid proximity"

  - date: 2026-09-21
    day: Monday
    holiday: Yom Kippur
    significance: Day of Atonement — holiest day of the year
    hebrew_date: 10 Tishrei 5787
    duration: "Sep 20 sunset – Sep 21 nightfall (25-hour fast)"
    work_restriction: full
    pack_note: "Monday — no pack event conflict"

  - date: 2026-09-26
    day: Saturday
    holiday: Sukkot begins
    significance: Feast of Booths (7 days)
    hebrew_date: 15-21 Tishrei 5787
    duration: "Sep 25 sunset – Oct 2 nightfall"
    work_restriction: "Full first 2 days (Sep 26-27); Chol HaMoed Sep 28 – Oct 1"
