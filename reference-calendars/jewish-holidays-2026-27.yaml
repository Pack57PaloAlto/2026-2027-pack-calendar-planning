  - date: 2026-10-03
    day: Saturday
    holiday: Shemini Atzeret / Simchat Torah
    significance: Conclusion of fall holidays; Torah reading cycle restarts
    hebrew_date: 22-23 Tishrei 5787
    duration: "Oct 2 sunset – Oct 4 nightfall"
    work_restriction: full (both days)
    pack_note: "Saturday-Sunday — no pack event conflict"

  - date: 2026-12-05
    day: Saturday
    holiday: Hanukkah begins
    significance: Festival of Lights (8 days)
    hebrew_date: 25 Kislev – 2 Tevet 5787
    duration: "Dec 4 sunset – Dec 12 nightfall"
    work_restriction: none (candle lighting nightly; not a work-restricted holiday)
    pack_note: "Dec pack meeting is 12/10 Thu — during Hanukkah. Fun opportunity for celebration!"

  - date: 2027-01-22
    day: Friday
    holiday: Tu BiShvat
    significance: "New Year for Trees"
    hebrew_date: 15 Sh'vat 5787
    work_restriction: none
    pack_note: "Friday — Pinewood Derby build session is 1/23 Sat, day after"

  - date: 2027-03-23
    day: Tuesday
    holiday: Purim
    significance: Celebration of Jewish deliverance
    hebrew_date: 14 Adar II 5787
    duration: "Mar 22 sunset – Mar 23 nightfall"
    work_restriction: none (festive)
    pack_note: "Tuesday — spring camping was 3/20-21 Sat-Sun, before Purim"

  - date: 2027-04-22
    day: Thursday
    holiday: Passover (Pesach) — First Seder
    significance: Commemorates the Exodus from Egypt
    hebrew_date: 15-22 Nisan 5787
    duration: "Apr 21 sunset – Apr 29 nightfall (8 days in diaspora)"
    work_restriction: "No work first 2 days (Apr 22-23) and last 2 days (Apr 28-29)"
