# ============================================================================
# Hindu / Indian Holidays — 2026-2027
# ============================================================================
# Major Hindu festivals and Indian national observances relevant to
# Pack 57 scheduling. Dates follow the Hindu lunar calendar and shift
# year to year on the Gregorian calendar.
#
# Sources: drikpanchang.com, timeanddate.com, calendarlabs.com
# ============================================================================

calendar: Hindu / Indian Holidays
coverage: September 2026 – May 2027 (pack season), plus key summer dates

# --- Full Year 2026 (for context) ---
year_2026:
  - date: 2026-01-14
    day: Wednesday
    holiday: Makar Sankranti / Pongal
    significance: Harvest festival; marks the sun's transition into Capricorn
    observance: regional

  - date: 2026-03-04
    day: Wednesday
    holiday: Holi
    significance: Festival of Colors; celebrates spring and good over evil
    observance: major

  - date: 2026-03-19
    day: Thursday
    holiday: Ugadi / Gudi Padwa
    significance: Hindu New Year (Deccan & South India)
    observance: regional

  - date: 2026-09-07
    day: Monday
    holiday: Ganesh Chaturthi
    significance: Birthday of Lord Ganesha; 10-day festival
    observance: major

  - date: 2026-10-10
    day: Saturday
    holiday: Sharad Navratri begins
    significance: Nine nights of worship of Goddess Durga
    duration: "Oct 10-18 (9 days)"
    observance: major

  - date: 2026-10-19
    day: Monday
    holiday: Dussehra (Vijayadashami)
    significance: Victory of good over evil; follows Navratri
    observance: major

  - date: 2026-11-08
    day: Sunday
    holiday: Diwali (Deepavali)
    significance: Festival of Lights; biggest Hindu celebration
    observance: major
    related_days:
      - "Nov 6 Fri: Dhanteras"
      - "Nov 7 Sat: Naraka Chaturdashi (Choti Diwali)"
      - "Nov 8 Sun: Lakshmi Puja (main day)"
      - "Nov 9 Mon: Govardhan Puja"
      - "Nov 10 Tue: Bhai Dooj"

