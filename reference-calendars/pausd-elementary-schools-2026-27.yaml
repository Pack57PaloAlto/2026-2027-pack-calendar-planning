back_to_school_night:
  note: >
    Each PAUSD school sets its own BTSN date, typically in late August
    (about 2 weeks after first day of school). In 2025-26 Barron Park
    held BTSN on Tue Aug 26. For 2026-27 (school starts Thu Aug 13),
    expect BTSN around Tue-Thu Aug 25-27.
    Individual school BTSN dates not yet published as of March 2026.
    Check each school's calendar page in summer 2026.
  estimated_window: "2026-08-25 to 2026-08-27"
