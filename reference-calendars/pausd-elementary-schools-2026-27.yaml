# PAUSD Elementary Schools — 2026-2027 Calendar
# All PAUSD elementary schools follow the SAME district calendar.
# Source: https://resources.finalsite.net/images/v1728448938/pausdorg/wrwwwr7oxxyenp7ysq7a/SchoolYearCalendar2026-27.pdf
#
# Pack 57 families attend these PAUSD elementary schools:
#   - Addison Elementary
#   - Hoover Elementary
#   - Palo Verde Elementary
#   - Duveneck Elementary
#   - Walter Hays Elementary
#   - Escondido Elementary
#   - Oak Knoll Elementary
#   - Ohlone Elementary
#
# ALL of these schools follow the district calendar in pausd-2026-27.yaml.
# Back to School Night is school-specific but typically late August
# (~2 weeks after first day of school on Aug 13).
#
# See pausd-2026-27.yaml for the full district calendar with all dates.

